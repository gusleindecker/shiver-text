<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shiver Text - Vue Example</title>
  </head>
  <body>
    <div id="app">
      <div ref="textElement">{{ message }}</div>
    </div>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/shiver-text@0.1.0/dist/index.js"></script>
    <script>
      const { createApp, ref, onMounted } = Vue;

      createApp({
        setup() {
          const textElement = ref();
          const message = ref(
            "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Pellentesque id fermentum nisi. Suspendisse id condimentum tortor.",
          );

          onMounted(() => {
            if (textElement.value) {
              const shiverer = new ShiverText(textElement.value, {
                delay: 12,
              });
              shiverer.start();
            }
          });

          return {
            message,
            textElement,
          };
        },
      }).mount("#app");
    </script>
  </body>
</html>
